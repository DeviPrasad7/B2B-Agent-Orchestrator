services:
  api:
    build: ./backend
    container_name: icp-agent-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src          # hot‑reload source in dev
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      # Single worker required: PubSub, CircuitBreaker, and TriggerMonitor
      # are all in-process. Multi-worker would cause duplicate polling and
      # missing SSE events. Switch to Redis-backed variants for multi-worker.
      - WORKERS=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - API_URL=http://api:8000   # points to the backend container
    depends_on:
      - api
    restart: unless-stopped
